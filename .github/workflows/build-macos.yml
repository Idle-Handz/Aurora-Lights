name: Build macOS MAUI (unsigned)

on:
  # push:
  #   paths:
  #     - 'Aurora.App/**'
  #     - 'Aurora.Logic/**'
  #     - 'Aurora.Components/**'
  #     - 'Aurora.Importer/**'
  #     - 'lib/**'
  #     - '.github/workflows/build-macos.yml'
  workflow_dispatch:

jobs:
  build-x64:
    name: Build macOS x64
    runs-on: macos-26-intel
    env:
      PROJECT: Aurora.App/Aurora.App.csproj
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workloads
        run: dotnet workload install maui --version 10.0.200

      - name: Show SDK toolchain
        run: |
          dotnet --info
          xcodebuild -version

      - name: Restore
        run: dotnet restore "$PROJECT"

      - name: Publish (maccatalyst-x64)
        run: |
          dotnet publish "$PROJECT" \
            -f net10.0-maccatalyst \
            -r maccatalyst-x64 \
            -c Release \
            -p:CreatePackage=false \
            -p:MtouchLink=None

      - name: Stage x64 app bundle
        run: |
          set -euo pipefail
          APP=$(find . -name "*.app" -not -path "*/obj/*" -not -path "*/.git/*" -print -quit || true)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app bundle found. Build tree:"
            find . -maxdepth 6 -not -path "*/obj/*" -not -path "*/.git/*" | head -60
            exit 1
          fi
          echo "Found: $APP"
          mkdir -p stage
          ditto -c -k --sequesterRsrc --keepParent "$APP" "stage/aurora-maccatalyst-x64.zip"

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-publish-maccatalyst-x64
          path: stage/aurora-maccatalyst-x64.zip
          if-no-files-found: error

  build-arm64:
    name: Build macOS arm64
    runs-on: macos-26-intel
    env:
      PROJECT: Aurora.App/Aurora.App.csproj
    steps:
