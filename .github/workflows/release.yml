name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0-alpha)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # Single source of truth for the version values stamped into the binaries. The release
  # tag the user types (e.g. "v0.1.0-alpha") is parsed once and reused by every build job
  # so Windows / macOS / Android all advertise the same version, and the in-app update
  # check can read InformationalVersion and compare it against the GitHub release tag.
  #
  # Three forms come out:
  #   semver    — full SemVer with pre-release (e.g. "0.1.0-alpha"); user-visible
  #   assembly  — numeric MAJOR.MINOR.PATCH only (e.g. "0.1.0"); MSBuild Version /
  #               AssemblyVersion / FileVersion all require this form
  #   info      — copy of semver, fed to InformationalVersion (which DOES accept suffix)
  prep_version:
    runs-on: ubuntu-latest
    outputs:
      semver:   ${{ steps.parse.outputs.semver }}
      assembly: ${{ steps.parse.outputs.assembly }}
      info:     ${{ steps.parse.outputs.info }}
    steps:
      - id: parse
        env:
          INPUT_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          RAW="${INPUT_VERSION#v}"          # strip leading 'v'
          ASM="${RAW%%-*}"                  # drop pre-release suffix for assembly stamp
          # Sanity: assembly must be three dot-separated integers
          if ! echo "$ASM" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: assembly version '$ASM' (from input '$INPUT_VERSION') is not MAJOR.MINOR.PATCH"
            exit 1
          fi
          echo "semver=$RAW"     >> "$GITHUB_OUTPUT"
          echo "assembly=$ASM"   >> "$GITHUB_OUTPUT"
          echo "info=$RAW"       >> "$GITHUB_OUTPUT"
          echo "Parsed input '$INPUT_VERSION' → semver=$RAW assembly=$ASM"

  build-windows-x64:
    needs: prep_version
    runs-on: windows-latest
    env:
      PROJECT: Aurora.App/Aurora.App.csproj
      VERSION_SEMVER:   ${{ needs.prep_version.outputs.semver }}
      VERSION_ASSEMBLY: ${{ needs.prep_version.outputs.assembly }}
      VERSION_INFO:     ${{ needs.prep_version.outputs.info }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workloads
        run: dotnet workload install maui

      - name: Restore Windows runtime graph
        shell: bash
        run: |
          dotnet restore "$PROJECT" \
            -r win-x64 \
            -p:TargetFramework=net10.0-windows10.0.19041.0 \
            -p:SelfContained=true

      - name: Restore shared project references
        shell: bash
        run: |
          dotnet restore Aurora.Components/Aurora.Components.csproj
          dotnet restore Aurora.Logic/Aurora.Logic.csproj
          dotnet restore Aurora.Importer/Aurora.Importer.csproj
          dotnet restore Aurora.PdfImport/Aurora.PdfImport.csproj

      - name: Publish (win-x64)
        shell: bash
        run: |
          dotnet publish "$PROJECT" \
            -f net10.0-windows10.0.19041.0 \
            -r win-x64 \
            -c Release \
            --self-contained true \
            --no-restore \
            -p:PublishReadyToRun=false \
            -p:WindowsPackageType=None \
            -p:Version=$VERSION_ASSEMBLY \
            -p:AssemblyVersion=$VERSION_ASSEMBLY.0 \
            -p:FileVersion=$VERSION_ASSEMBLY.0 \
            -p:InformationalVersion=$VERSION_INFO \
            -p:ApplicationDisplayVersion=$VERSION_ASSEMBLY \
            -o publish/win-x64

      - name: Zip (win-x64)
        shell: pwsh
        run: Compress-Archive -Path publish\win-x64 -DestinationPath aurora-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: aurora-windows-x64.zip
          if-no-files-found: error

  build-windows-arm64:
    needs: prep_version
    runs-on: windows-latest
    env:
      PROJECT: Aurora.App/Aurora.App.csproj
      VERSION_SEMVER:   ${{ needs.prep_version.outputs.semver }}
      VERSION_ASSEMBLY: ${{ needs.prep_version.outputs.assembly }}
      VERSION_INFO:     ${{ needs.prep_version.outputs.info }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workloads
        run: dotnet workload install maui

      - name: Restore Windows runtime graph
        shell: bash
        run: |
          dotnet restore "$PROJECT" \
            -r win-arm64 \
            -p:TargetFramework=net10.0-windows10.0.19041.0 \
            -p:SelfContained=true

      - name: Restore shared project references
        shell: bash
        run: |
          dotnet restore Aurora.Components/Aurora.Components.csproj
          dotnet restore Aurora.Logic/Aurora.Logic.csproj
          dotnet restore Aurora.Importer/Aurora.Importer.csproj
          dotnet restore Aurora.PdfImport/Aurora.PdfImport.csproj

      - name: Publish (win-arm64)
        shell: bash
        run: |
          dotnet publish "$PROJECT" \
            -f net10.0-windows10.0.19041.0 \
            -r win-arm64 \
            -c Release \
            --self-contained true \
            --no-restore \
            -p:PublishReadyToRun=false \
            -p:WindowsPackageType=None \
            -p:Version=$VERSION_ASSEMBLY \
            -p:AssemblyVersion=$VERSION_ASSEMBLY.0 \
            -p:FileVersion=$VERSION_ASSEMBLY.0 \
            -p:InformationalVersion=$VERSION_INFO \
            -p:ApplicationDisplayVersion=$VERSION_ASSEMBLY \
            -o publish/win-arm64

      - name: Zip (win-arm64)
        shell: pwsh
        run: Compress-Archive -Path publish\win-arm64 -DestinationPath aurora-windows-arm64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: aurora-windows-arm64.zip
          if-no-files-found: error

  build-android:
    needs: prep_version
    runs-on: ubuntu-latest
    env:
      PROJECT: Aurora.App/Aurora.App.csproj
      VERSION_SEMVER:   ${{ needs.prep_version.outputs.semver }}
      VERSION_ASSEMBLY: ${{ needs.prep_version.outputs.assembly }}
      VERSION_INFO:     ${{ needs.prep_version.outputs.info }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Prepare signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "${{ github.workspace }}/aurora-ci.keystore"
          echo "Keystore decoded successfully."

      - name: Restore
        run: dotnet restore "$PROJECT"

      - name: Publish (android-arm64)
        run: |
          dotnet publish "$PROJECT" \
            -f net10.0-android \
            -r android-arm64 \
            -c Release \
            --no-restore \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore="${{ github.workspace }}/aurora-ci.keystore" \
            -p:AndroidSigningKeyAlias=aurora \
            -p:AndroidSigningKeyPass=aurora-ci \
            -p:AndroidSigningStorePass=aurora-ci \
            -p:ApplicationVersion=${{ github.run_number }} \
            -p:Version=$VERSION_ASSEMBLY \
            -p:AssemblyVersion=$VERSION_ASSEMBLY.0 \
            -p:FileVersion=$VERSION_ASSEMBLY.0 \
            -p:InformationalVersion=$VERSION_INFO \
            -p:ApplicationDisplayVersion=$VERSION_ASSEMBLY

      - name: Locate APK
        run: |
          APK=$(find . -name "*-Signed.apk" -not -path "*/obj/*" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find . -name "*.apk" -not -path "*/obj/*" | head -1)
          fi
          cp "$APK" aurora-android-arm64.apk
          echo "Found: $APK"

      - uses: actions/upload-artifact@v4
        with:
          name: android-arm64
          path: aurora-android-arm64.apk
          if-no-files-found: error

  build-macos-x64:
    needs: prep_version
    runs-on: macos-26-intel
    env:
      PROJECT: Aurora.App/Aurora.App.csproj
      VERSION_SEMVER:   ${{ needs.prep_version.outputs.semver }}
      VERSION_ASSEMBLY: ${{ needs.prep_version.outputs.assembly }}
      VERSION_INFO:     ${{ needs.prep_version.outputs.info }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workloads
        run: dotnet workload install maui --version 10.0.200

      - name: Restore
        run: dotnet restore "$PROJECT"

      - name: Publish (maccatalyst-x64)
        run: |
          dotnet publish "$PROJECT" \
            -f net10.0-maccatalyst \
            -r maccatalyst-x64 \
            -c Release \
            -p:CreatePackage=false \
            -p:MtouchLink=None \
            -p:Version=$VERSION_ASSEMBLY \
            -p:AssemblyVersion=$VERSION_ASSEMBLY.0 \
            -p:FileVersion=$VERSION_ASSEMBLY.0 \
            -p:InformationalVersion=$VERSION_INFO \
            -p:ApplicationDisplayVersion=$VERSION_ASSEMBLY

      - name: Stage x64 app bundle
        run: |
          set -euo pipefail
          APP=$(find . -name "*.app" -not -path "*/obj/*" -not -path "*/.git/*" -print -quit || true)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app bundle found"
            find . -maxdepth 6 -not -path "*/obj/*" -not -path "*/.git/*" | head -60
            exit 1
          fi
          mkdir -p stage
          ditto -c -k --sequesterRsrc --keepParent "$APP" "stage/aurora-maccatalyst-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: stage/aurora-maccatalyst-x64.zip
          if-no-files-found: error

  build-macos-arm64:
    needs: prep_version
    runs-on: macos-26-intel
    env:
      PROJECT: Aurora.App/Aurora.App.csproj
      VERSION_SEMVER:   ${{ needs.prep_version.outputs.semver }}
      VERSION_ASSEMBLY: ${{ needs.prep_version.outputs.assembly }}
      VERSION_INFO:     ${{ needs.prep_version.outputs.info }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workloads
        run: dotnet workload install maui --version 10.0.200

      - name: Restore
        run: dotnet restore "$PROJECT"

      - name: Publish (maccatalyst-arm64)
        run: |
          dotnet publish "$PROJECT" \
            -f net10.0-maccatalyst \
            -r maccatalyst-arm64 \
            -c Release \
            -p:CreatePackage=false \
            -p:MtouchLink=None \
            -p:Version=$VERSION_ASSEMBLY \
            -p:AssemblyVersion=$VERSION_ASSEMBLY.0 \
            -p:FileVersion=$VERSION_ASSEMBLY.0 \
            -p:InformationalVersion=$VERSION_INFO \
            -p:ApplicationDisplayVersion=$VERSION_ASSEMBLY

      - name: Stage arm64 app bundle
        run: |
          set -euo pipefail
          APP=$(find . -name "*.app" -not -path "*/obj/*" -not -path "*/.git/*" -print -quit || true)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app bundle found"
            find . -maxdepth 6 -not -path "*/obj/*" -not -path "*/.git/*" | head -60
            exit 1
          fi
          mkdir -p stage
          ditto -c -k --sequesterRsrc --keepParent "$APP" "stage/aurora-maccatalyst-arm64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: stage/aurora-maccatalyst-arm64.zip
          if-no-files-found: error

  release:
    needs:
      - build-windows-x64
      - build-windows-arm64
      - build-android
      - build-macos-x64
      - build-macos-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "$VERSION" \
            --repo "$REPO" \
            --title "Aurora Lights $VERSION" \
            --draft \
            --generate-notes \
            "artifacts/windows-x64/aurora-windows-x64.zip" \
            "artifacts/windows-arm64/aurora-windows-arm64.zip" \
            "artifacts/android-arm64/aurora-android-arm64.apk" \
            "artifacts/macos-x64/aurora-maccatalyst-x64.zip" \
            "artifacts/macos-arm64/aurora-maccatalyst-arm64.zip"
