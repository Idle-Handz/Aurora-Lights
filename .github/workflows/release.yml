name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag override, or auto for the next minor release'
        required: false
        default: 'auto'
        type: string

permissions:
  contents: write

jobs:
  # Single source of truth for the version values stamped into the binaries. The release
  # tag selected by the auto-suggestion or user override is parsed once and reused by every build job
  # so Windows / macOS / Android all advertise the same version, and the in-app update
  # check can read InformationalVersion and compare it against the GitHub release tag.
  #
  # Four forms come out:
  #   tag       — full release tag with leading "v" (e.g. "v0.1.0-alpha")
  #   semver    — full SemVer with pre-release (e.g. "0.1.0-alpha"); user-visible
  #   assembly  — numeric MAJOR.MINOR.PATCH only (e.g. "0.1.0"); MSBuild Version /
  #               AssemblyVersion / FileVersion all require this form
  #   info      — copy of semver, fed to InformationalVersion (which DOES accept suffix)
  prep_version:
    runs-on: ubuntu-latest
    outputs:
      tag:      ${{ steps.parse.outputs.tag }}
      semver:   ${{ steps.parse.outputs.semver }}
      assembly: ${{ steps.parse.outputs.assembly }}
      info:     ${{ steps.parse.outputs.info }}
      latest:   ${{ steps.parse.outputs.latest }}
      suggested: ${{ steps.parse.outputs.suggested }}
    steps:
      - id: parse
        env:
          INPUT_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          LATEST_TAG="$(gh api "repos/$REPO/releases?per_page=100" \
            --jq '[.[] | select(.draft == false)] | sort_by(.published_at) | last | .tag_name // empty')"

          if [[ -n "$LATEST_TAG" ]]; then
            LATEST_RAW="${LATEST_TAG#v}"
            if [[ ! "$LATEST_RAW" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "ERROR: latest published release '$LATEST_TAG' is not a supported SemVer tag"
              exit 1
            fi
            PRERELEASE_SUFFIX="${BASH_REMATCH[4]:-}"
            SUGGESTED_TAG="v${BASH_REMATCH[1]}.$((10#${BASH_REMATCH[2]} + 1)).0${PRERELEASE_SUFFIX}"
          else
            LATEST_TAG="(none)"
            SUGGESTED_TAG="v0.1.0-beta"
          fi

          REQUESTED_TAG="${INPUT_VERSION:-auto}"
          if [[ "$REQUESTED_TAG" == "auto" ]]; then
            RESOLVED_TAG="$SUGGESTED_TAG"
          elif [[ "$REQUESTED_TAG" == v* ]]; then
            RESOLVED_TAG="$REQUESTED_TAG"
          else
            RESOLVED_TAG="v$REQUESTED_TAG"
          fi

          RAW="${RESOLVED_TAG#v}"           # strip leading 'v'
          ASM="${RAW%%-*}"                  # drop pre-release suffix for assembly stamp
          if [[ ! "$RAW" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "ERROR: release tag '$RESOLVED_TAG' is not a supported SemVer tag"
            exit 1
          fi
          # Sanity: assembly must be three dot-separated integers
          if ! echo "$ASM" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: assembly version '$ASM' (from tag '$RESOLVED_TAG') is not MAJOR.MINOR.PATCH"
            exit 1
          fi
          echo "tag=$RESOLVED_TAG" >> "$GITHUB_OUTPUT"
          echo "semver=$RAW"     >> "$GITHUB_OUTPUT"
          echo "assembly=$ASM"   >> "$GITHUB_OUTPUT"
          echo "info=$RAW"       >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "suggested=$SUGGESTED_TAG" >> "$GITHUB_OUTPUT"
          {
            echo "### Release version"
            echo ""
            echo "| Item | Version |"
            echo "| --- | --- |"
            echo "| Latest published release | \`$LATEST_TAG\` |"
            echo "| Suggested next minor | \`$SUGGESTED_TAG\` |"
            echo "| Publishing | \`$RESOLVED_TAG\` |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Latest published release: $LATEST_TAG"
          echo "Suggested next minor: $SUGGESTED_TAG"
          echo "Publishing: $RESOLVED_TAG (semver=$RAW assembly=$ASM)"

  build-windows-x64:
    needs: prep_version
    runs-on: windows-latest
    env:
      PROJECT: Aurora.App/Aurora.App.csproj
      VERSION_SEMVER:   ${{ needs.prep_version.outputs.semver }}
      VERSION_ASSEMBLY: ${{ needs.prep_version.outputs.assembly }}
      VERSION_INFO:     ${{ needs.prep_version.outputs.info }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workloads
        run: dotnet workload install maui

      - name: Install vpk tool
        shell: bash
        run: |
          dotnet tool install -g vpk --version 0.0.1298
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Restore Windows runtime graph
        shell: bash
        run: |
          dotnet restore "$PROJECT" \
            -r win-x64 \
            -p:TargetFramework=net10.0-windows10.0.19041.0 \
            -p:SelfContained=true

      - name: Restore shared project references
        shell: bash
        run: |
          dotnet restore Aurora.Components/Aurora.Components.csproj
          dotnet restore Aurora.Logic/Aurora.Logic.csproj
          dotnet restore Aurora.Importer/Aurora.Importer.csproj
          dotnet restore Aurora.PdfImport/Aurora.PdfImport.csproj

      - name: Publish (win-x64)
        shell: bash
        run: |
          dotnet publish "$PROJECT" \
            -f net10.0-windows10.0.19041.0 \
            -r win-x64 \
            -c Release \
            --self-contained true \
            --no-restore \
            -p:PublishReadyToRun=false \
            -p:WindowsPackageType=None \
            -p:Version=$VERSION_ASSEMBLY \
            -p:AssemblyVersion=$VERSION_ASSEMBLY.0 \
            -p:FileVersion=$VERSION_ASSEMBLY.0 \
            -p:InformationalVersion=$VERSION_INFO \
            -p:ApplicationDisplayVersion=$VERSION_ASSEMBLY \
            -o publish/win-x64

      - name: Download previous release for delta (win-x64)
        # Best-effort: skipped silently on first release or if GitHub rate-limits.
        # vpk pack still produces a full nupkg; only the delta is missing.
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p releases/win-x64
          PRE_ARGS=()
          if [[ "$VERSION_SEMVER" == *-* ]]; then
            PRE_ARGS+=(--pre)
          fi
          vpk --yes --skip-updates download github \
            --repoUrl https://github.com/${{ github.repository }} \
            --token "$GITHUB_TOKEN" \
            --channel win-x64 \
            --outputDir releases/win-x64 \
            "${PRE_ARGS[@]}" \
          || echo "No previous release found for win-x64 — delta will be skipped."

      - name: Pack with Velopack (win-x64)
        shell: bash
        run: |
          vpk --yes --skip-updates pack \
            --packId    Aurora.Reflections \
            --packVersion "$VERSION_SEMVER" \
            --packDir   publish/win-x64 \
            --mainExe   Aurora.Reflections.exe \
            --outputDir releases/win-x64 \
            --channel   win-x64

      - uses: actions/upload-artifact@v4
        with:
          name: velopack-win-x64
          path: releases/win-x64/
          if-no-files-found: error

  build-windows-arm64:
    needs: prep_version
    runs-on: windows-latest
    env:
      PROJECT: Aurora.App/Aurora.App.csproj
      VERSION_SEMVER:   ${{ needs.prep_version.outputs.semver }}
      VERSION_ASSEMBLY: ${{ needs.prep_version.outputs.assembly }}
      VERSION_INFO:     ${{ needs.prep_version.outputs.info }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workloads
        run: dotnet workload install maui

      - name: Install vpk tool
        shell: bash
        run: |
          dotnet tool install -g vpk --version 0.0.1298
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Restore Windows runtime graph
        shell: bash
        run: |
          dotnet restore "$PROJECT" \
            -r win-arm64 \
            -p:TargetFramework=net10.0-windows10.0.19041.0 \
            -p:SelfContained=true

      - name: Restore shared project references
        shell: bash
        run: |
          dotnet restore Aurora.Components/Aurora.Components.csproj
          dotnet restore Aurora.Logic/Aurora.Logic.csproj
          dotnet restore Aurora.Importer/Aurora.Importer.csproj
          dotnet restore Aurora.PdfImport/Aurora.PdfImport.csproj

      - name: Publish (win-arm64)
        shell: bash
        run: |
          dotnet publish "$PROJECT" \
            -f net10.0-windows10.0.19041.0 \
            -r win-arm64 \
            -c Release \
            --self-contained true \
            --no-restore \
            -p:PublishReadyToRun=false \
            -p:WindowsPackageType=None \
            -p:Version=$VERSION_ASSEMBLY \
            -p:AssemblyVersion=$VERSION_ASSEMBLY.0 \
            -p:FileVersion=$VERSION_ASSEMBLY.0 \
            -p:InformationalVersion=$VERSION_INFO \
            -p:ApplicationDisplayVersion=$VERSION_ASSEMBLY \
            -o publish/win-arm64

      - name: Download previous release for delta (win-arm64)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p releases/win-arm64
          PRE_ARGS=()
          if [[ "$VERSION_SEMVER" == *-* ]]; then
            PRE_ARGS+=(--pre)
          fi
          vpk --yes --skip-updates download github \
            --repoUrl https://github.com/${{ github.repository }} \
            --token "$GITHUB_TOKEN" \
            --channel win-arm64 \
            --outputDir releases/win-arm64 \
            "${PRE_ARGS[@]}" \
          || echo "No previous release found for win-arm64 — delta will be skipped."

      - name: Pack with Velopack (win-arm64)
        shell: bash
        run: |
          vpk --yes --skip-updates pack \
            --packId    Aurora.Reflections \
            --packVersion "$VERSION_SEMVER" \
            --packDir   publish/win-arm64 \
            --mainExe   Aurora.Reflections.exe \
            --outputDir releases/win-arm64 \
            --channel   win-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: velopack-win-arm64
          path: releases/win-arm64/
          if-no-files-found: error

  build-android:
    needs: prep_version
    runs-on: ubuntu-latest
    env:
      PROJECT: Aurora.App/Aurora.App.csproj
      VERSION_SEMVER:   ${{ needs.prep_version.outputs.semver }}
      VERSION_ASSEMBLY: ${{ needs.prep_version.outputs.assembly }}
      VERSION_INFO:     ${{ needs.prep_version.outputs.info }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Prepare signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "${{ github.workspace }}/aurora-ci.keystore"
          echo "Keystore decoded successfully."

      - name: Restore
        run: dotnet restore "$PROJECT"

      - name: Compute Android version code
        id: android_version
        shell: bash
        run: |
          # Use one monotonic sequence across CI and release workflows. GitHub run_number
          # is workflow-local, so release APKs could otherwise look older than CI APKs.
          BASE_EPOCH=1577836800 # 2020-01-01T00:00:00Z
          VERSION_CODE=$(( $(date -u +%s) - BASE_EPOCH ))
          if (( VERSION_CODE <= 0 || VERSION_CODE > 2100000000 )); then
            echo "ERROR: Android versionCode '$VERSION_CODE' is outside the supported range."
            exit 1
          fi
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Android versionCode: $VERSION_CODE"

      - name: Publish (android-arm64)
        run: |
          dotnet publish "$PROJECT" \
            -f net10.0-android \
            -r android-arm64 \
            -c Release \
            --no-restore \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore="${{ github.workspace }}/aurora-ci.keystore" \
            -p:AndroidSigningKeyAlias=aurora \
            -p:AndroidSigningKeyPass=aurora-ci \
            -p:AndroidSigningStorePass=aurora-ci \
            -p:ApplicationVersion=${{ steps.android_version.outputs.code }} \
            -p:Version=$VERSION_ASSEMBLY \
            -p:AssemblyVersion=$VERSION_ASSEMBLY.0 \
            -p:FileVersion=$VERSION_ASSEMBLY.0 \
            -p:InformationalVersion=$VERSION_INFO \
            -p:ApplicationDisplayVersion=$VERSION_ASSEMBLY

      - name: Locate APK
        run: |
          APK=$(find . -name "*-Signed.apk" -not -path "*/obj/*" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find . -name "*.apk" -not -path "*/obj/*" | head -1)
          fi
          cp "$APK" aurora-android-arm64.apk
          echo "Found: $APK"

      - name: Verify APK signing and version
        run: |
          BUILD_TOOLS=$(ls -d "$ANDROID_SDK_ROOT/build-tools"/*/ 2>/dev/null | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"
          echo "=== APK package info ==="
          "$BUILD_TOOLS/aapt2" dump badging aurora-android-arm64.apk \
            | grep -E "package|versionCode|versionName|sdkVersion"
          "$BUILD_TOOLS/aapt2" dump badging aurora-android-arm64.apk \
            | grep -q "name='com.auroralights.app'"
          "$BUILD_TOOLS/aapt2" dump badging aurora-android-arm64.apk \
            | grep -q "versionCode='${{ steps.android_version.outputs.code }}'"
          echo "=== APK signing certificate ==="
          "$BUILD_TOOLS/apksigner" verify --print-certs aurora-android-arm64.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-arm64
          path: aurora-android-arm64.apk
          if-no-files-found: error

  build-macos-x64:
    needs: prep_version
    runs-on: macos-26-intel
    env:
      PROJECT: Aurora.App/Aurora.App.csproj
      VERSION_SEMVER:   ${{ needs.prep_version.outputs.semver }}
      VERSION_ASSEMBLY: ${{ needs.prep_version.outputs.assembly }}
      VERSION_INFO:     ${{ needs.prep_version.outputs.info }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workloads
        run: dotnet workload install maui --version 10.0.200

      - name: Restore
        run: dotnet restore "$PROJECT"

      - name: Publish (maccatalyst-x64)
        run: |
          dotnet publish "$PROJECT" \
            -f net10.0-maccatalyst \
            -r maccatalyst-x64 \
            -c Release \
            -p:CreatePackage=false \
            -p:MtouchLink=None \
            -p:Version=$VERSION_ASSEMBLY \
            -p:AssemblyVersion=$VERSION_ASSEMBLY.0 \
            -p:FileVersion=$VERSION_ASSEMBLY.0 \
            -p:InformationalVersion=$VERSION_INFO \
            -p:ApplicationDisplayVersion=$VERSION_ASSEMBLY

      - name: Stage x64 app bundle
        run: |
          set -euo pipefail
          APP=$(find . -name "*.app" -not -path "*/obj/*" -not -path "*/.git/*" -print -quit || true)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app bundle found"
            find . -maxdepth 6 -not -path "*/obj/*" -not -path "*/.git/*" | head -60
            exit 1
          fi
          mkdir -p stage
          ditto -c -k --sequesterRsrc --keepParent "$APP" "stage/aurora-maccatalyst-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: stage/aurora-maccatalyst-x64.zip
          if-no-files-found: error

  build-macos-arm64:
    needs: prep_version
    runs-on: macos-26-intel
    env:
      PROJECT: Aurora.App/Aurora.App.csproj
      VERSION_SEMVER:   ${{ needs.prep_version.outputs.semver }}
      VERSION_ASSEMBLY: ${{ needs.prep_version.outputs.assembly }}
      VERSION_INFO:     ${{ needs.prep_version.outputs.info }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workloads
        run: dotnet workload install maui --version 10.0.200

      - name: Restore
        run: dotnet restore "$PROJECT"

      - name: Publish (maccatalyst-arm64)
        run: |
          dotnet publish "$PROJECT" \
            -f net10.0-maccatalyst \
            -r maccatalyst-arm64 \
            -c Release \
            -p:CreatePackage=false \
            -p:MtouchLink=None \
            -p:Version=$VERSION_ASSEMBLY \
            -p:AssemblyVersion=$VERSION_ASSEMBLY.0 \
            -p:FileVersion=$VERSION_ASSEMBLY.0 \
            -p:InformationalVersion=$VERSION_INFO \
            -p:ApplicationDisplayVersion=$VERSION_ASSEMBLY

      - name: Stage arm64 app bundle
        run: |
          set -euo pipefail
          APP=$(find . -name "*.app" -not -path "*/obj/*" -not -path "*/.git/*" -print -quit || true)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app bundle found"
            find . -maxdepth 6 -not -path "*/obj/*" -not -path "*/.git/*" | head -60
            exit 1
          fi
          mkdir -p stage
          ditto -c -k --sequesterRsrc --keepParent "$APP" "stage/aurora-maccatalyst-arm64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: stage/aurora-maccatalyst-arm64.zip
          if-no-files-found: error

  release:
    needs:
      - prep_version
      - build-windows-x64
      - build-windows-arm64
      - build-android
      - build-macos-x64
      - build-macos-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.prep_version.outputs.tag }}
        run: |
          # Collect Velopack assets. On the very first release there are no delta nupkgs, only
          # full nupkgs + Setup.exe + RELEASES manifest — all of them land in the artifact dirs.
          # Glob expansion handles both first-release (no delta) and subsequent (full + delta).
          VELO_X64=$(ls artifacts/velopack-win-x64/ | xargs -I{} echo "artifacts/velopack-win-x64/{}")
          VELO_ARM64=$(ls artifacts/velopack-win-arm64/ | xargs -I{} echo "artifacts/velopack-win-arm64/{}")
          RELEASE_FLAGS=(--draft --generate-notes)
          if [[ "${VERSION#v}" == *-* ]]; then
            RELEASE_FLAGS+=(--prerelease)
          fi

          gh release create "$VERSION" \
            --repo "$REPO" \
            --title "Aurora Lights $VERSION" \
            "${RELEASE_FLAGS[@]}" \
            "artifacts/android-arm64/aurora-android-arm64.apk" \
            "artifacts/macos-x64/aurora-maccatalyst-x64.zip" \
            "artifacts/macos-arm64/aurora-maccatalyst-arm64.zip" \
            $VELO_X64 \
            $VELO_ARM64
